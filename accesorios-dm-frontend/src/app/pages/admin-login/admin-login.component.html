<section class="login-page">
  <article class="login-card">
    <div class="brand">
      <span>ACCESORIOS D&M</span>
      <h1>Panel administrador</h1>
      <p>Ingresa con una cuenta autorizada para administrar productos y contenido.</p>
    </div>

    <form class="login-form" (ngSubmit)="login()">
      <label>
        Correo electrónico
        <input
          type="email"
          name="correo"
          [(ngModel)]="correo"
          placeholder="admin@accesoriosdm.com"
          autocomplete="email"
        />
      </label>

      <label>
        Contraseña
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </label>

      <p class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </p>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Validando acceso...' : 'Iniciar sesión' }}
      </button>
    </form>
  </article>
</section>
