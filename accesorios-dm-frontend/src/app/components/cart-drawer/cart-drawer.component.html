<div class="drawer-backdrop" *ngIf="isOpen" (click)="close()"></div>

<aside class="cart-drawer" [class.open]="isOpen">
  <header class="drawer-header">
    <div>
      <span>Tu compra</span>
      <h2>Carrito</h2>
    </div>

    <button type="button" (click)="close()">×</button>
  </header>

  <p class="empty-cart" *ngIf="items.length === 0">
    Tu carrito está vacío.
  </p>

  <section class="drawer-items" *ngIf="items.length > 0">
    <article class="drawer-item" *ngFor="let item of items">
      <img [src]="item.product.imageUrl" [alt]="item.product.name" />

      <div class="item-info">
        <h3>{{ item.product.name }}</h3>
        <strong>${{ item.product.price | number:'1.0-0' }}</strong>

        <div class="quantity-control">
          <button type="button" (click)="decrease(item.product.id)">−</button>
          <span>{{ item.quantity }}</span>
          <button type="button" (click)="increase(item.product.id)">+</button>
        </div>
      </div>

      <button type="button" class="remove-button" (click)="remove(item.product.id)">
        <i class="bi bi-trash"></i>
      </button>
    </article>
  </section>

  <footer class="drawer-footer" *ngIf="items.length > 0">
    <div class="total-row">
      <span>Total</span>
      <strong>${{ total | number:'1.0-0' }}</strong>
    </div>

    <a routerLink="/carrito" (click)="close()">
      Ver carrito
    </a>
  </footer>
</aside>
