services:
  api-gateway:
    build: .
    container_name: accesorios-dm-gateway-prod
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - NODE_ENV=production
      - LOG_LEVEL=warn
      - INVENTORY_HOST=accesorios-dm-inventory-service-prod
      - INVENTORY_PORT=8080
      - SECURITY_HOST=accesorios-dm-security-prod
      - SECURITY_PORT=8888
      - PAYMENT_HOST=accesorios-dm-payment-prod
      - PAYMENT_PORT=9000
      - ALLOWED_ORIGINS=https://accesoriosdm.com,https://www.accesoriosdm.com
    volumes:
      - ./logs:/app/logs
      - /app/node_modules
    networks:
      - accesorios-dm-net-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/gateway/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  accesorios-dm-net-prod:
    external: true
    name: accesorios-dm-database_accesorios-network-prod